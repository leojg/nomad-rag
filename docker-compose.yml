services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nomad-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nomad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nomad}
      POSTGRES_DB: ${POSTGRES_DB:-nomad_latam}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomad-rag-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-nomad}:${POSTGRES_PASSWORD:-nomad}@postgres:5432/${POSTGRES_DB:-nomad_latam}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data  # mounts data/ so ingest script can read markdown files

volumes:
  postgres_data: